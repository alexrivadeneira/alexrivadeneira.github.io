<html>  
<head>
    <title>Clock</title>
    <style>
        #clock{
            position: relative;
            border: 2px solid black;
            border-radius: 100%;
            width: 150px;
            height: 150px;
            background: url('img/cloud.png');
            background-position-x: 150px;
            background-position-y: 150px;
        }
        #minute-hand{
            width: 3px;
            height: 40px;
            position: absolute;
            left: 75px;
            top: 37.5px;
            background: #000;
            transform-origin: 0% 100%;
        }
        #hour-hand{
            width: 4px;
            height: 30px;
            background: #000;
            position: absolute;
            left: 75px;
            top: 47.5px;
            transform-origin: 0% 100%;

        }
        #second-hand{
            width: 2px;
            height: 50px;
            background: black;
            position: absolute;
            left: 75px;
            top: 27.5px;
            transform-origin: 0% 100%;

        }

        #center{
            width: 7px;
            height: 7px;
            position: absolute;
            background: black;
            top: 73px;
            left: 73px;
            border-radius: 100%;
        }
        
    </style>
</head>

<body>
    
    <div id='clock'>
        <div id='minute-hand'></div>
        <div id='hour-hand'></div>
        <div id='second-hand'></div>
        <div id='center'></div>
    </div>


    <script src='clock.js'>
    </script> 
</body>
</html>

<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
	<link rel="stylesheet" href="stylesheet.css">	
</head>

<body>

	<div class="container-fluid">

	<ul id="nav" class="nav nav-tabs">

  <li class="active">
    <a href="#home">Home</a>
  </li>
  <li><a href="#portfolio">Portfolio</a></li>
  <li><a href="#journal">Journal</a></li>
  <li><a href="#gallery">Gallery</a></li>
  <li><a href="#about">About</a></li>

</ul>

<div class="container">
<div id="content">

</div>
</div>


<div class="row" id="crack">
</div>

	</div>


    <footer class="footer">
      <div class="container">
      <div class="row">
      <div class="col-xs-3">

              <span class="text-muted">Adjust the crack:</span>

  <input oninput="updateSlider(this.value)" type="range" min="1" max="100" value="50" class="slider" id="slider">
  <script>

  var slider = document.getElementById("crack");
  
  function updateSlider(value){
  	if(value < 10){
  		slider.style.background = "url('img/f1.gif')";
  	} else if(value < 30){
  		slider.style.background = "url('img/f2.gif')";
  	} else if(value < 50){
  		slider.style.background = "url('img/f3.gif')"; 	
  	} else if(value < 60){
  		slider.style.background = "url('img/f4.gif')";
  	} else if(value < 70){
  		slider.style.background = "url('img/f5.gif')";
  	} else {
  		slider.style.background = "url('img/f6.gif')";

  	}  	 	
  }


  var loc = window.location;

  window.onhashchange = function(loc){
  	var newRoute = getRoute(loc.newURL);
  	updateView(newRoute);
  	updateNav(newRoute);
  }


  function getRoute(url){
  	return url.split("#")[1];
  }



  function updateView(view){
  	var content = document.getElementById("content");
  	content.innerHTML = views[view];

  }

  function updateNav(view){
  	var nav = document.getElementById("nav");
  	var lis = nav.getElementsByTagName("li");
  	for(var i = 0; i < lis.length; i++){
  		lis[i].classList.remove("active");
  		as = lis[i].getElementsByTagName("a");
  		console.log(as);
  		for(var j = 0; j < as.length; j++){
  			if(as[j].href.split("#")[1] === view){
  				lis[i].classList.add("active");
  			}
  		}
  	}
  }

  var views = {
  	home: `		
  	<h3>Dear Citizens,</h3>
		<p>Here are some unsolicited tips on living a better life:</p>
		<ul>
			<li>Drive less and walk more/li>
			<li>Meditate</li>
			<li>Watch old movies</li>
			<li>Experience nature</li>
			<li>Don't be grouchy</li>
		</ul>
		<p>Welcome to my corner of the web</p>
		<p>Sincerely,</p>
		<p class="signature">Alex</p>
		`,
		portfolio:`
		<p>Portfolio items</p>
		`,
		journal:`
		<p>Journal entries, NOT blogs</p>
		`,
		gallery: `
		<p>Gallery, not Photos</p>
		`,
		about: `
		<h1>Everything about </h1>
		`
  };

  </script>
</div>
  </div>
      </div>
    </footer>

</script>

</body>
</html>
